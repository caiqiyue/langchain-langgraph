<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepAgents 框架定位</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); min-height: 100vh; padding: 40px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; color: #5b21b6; font-size: 36px; margin-bottom: 50px; }
        .stack { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .layer-box { background: white; border-radius: 16px; padding: 25px 50px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); text-align: center; min-width: 400px; }
        .layer-box.langchain { border: 3px solid #6366f1; }
        .layer-box.langgraph { border: 3px solid #8b5cf6; }
        .layer-box.deepagents { border: 3px solid #f97316; background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%); }
        .layer-title { font-size: 26px; color: #1e293b; margin-bottom: 8px; }
        .layer-subtitle { font-size: 14px; color: #64748b; }
        .layer-icon { font-size: 40px; margin-bottom: 10px; }
        .arrows { display: flex; flex-direction: column; gap: 5px; color: #a78bfa; font-size: 24px; }
        .pillars { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 40px; }
        .pillar-box { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .pillar-icon { font-size: 32px; margin-bottom: 10px; }
        .pillar-title { font-size: 16px; color: #1e293b; font-weight: 600; margin-bottom: 5px; }
        .pillar-desc { font-size: 12px; color: #64748b; }
        @media (max-width: 800px) { .pillars { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 DeepAgents 框架定位</h1>
        <div class="stack">
            <div class="layer-box langchain">
                <div class="layer-icon">🧱</div>
                <div class="layer-title">LangChain</div>
                <div class="layer-subtitle">基础组件库 - 积木块</div>
            </div>
            <div class="arrows">↑<span style="font-size:16px;">基于</span>↓</div>
            <div class="layer-box langgraph">
                <div class="layer-icon">🔗</div>
                <div class="layer-title">LangGraph</div>
                <div class="layer-subtitle">编排引擎 - 地基</div>
            </div>
            <div class="arrows">↑<span style="font-size:16px;">基于</span>↓</div>
            <div class="layer-box deepagents">
                <div class="layer-icon">🎯</div>
                <div class="layer-title">DeepAgents</div>
                <div class="layer-subtitle">应用框架 - 加速器</div>
            </div>
        </div>
        <div class="pillars">
            <div class="pillar-box">
                <div class="pillar-icon">💬</div>
                <div class="pillar-title">系统提示词</div>
                <div class="pillar-desc">定义 Agent 世界观</div>
            </div>
            <div class="pillar-box">
                <div class="pillar-icon">📋</div>
                <div class="pillar-title">规划工具</div>
                <div class="pillar-desc">write_todos/read_todos</div>
            </div>
            <div class="pillar-box">
                <div class="pillar-icon">📁</div>
                <div class="pillar-title">文件系统</div>
                <div class="pillar-desc">ls/read/write/edit</div>
            </div>
            <div class="pillar-box">
                <div class="pillar-icon">🤖</div>
                <div class="pillar-title">子代理</div>
                <div class="pillar-desc">task 工具动态生成</div>
            </div>
        </div>
    </div>
</body>
</html>

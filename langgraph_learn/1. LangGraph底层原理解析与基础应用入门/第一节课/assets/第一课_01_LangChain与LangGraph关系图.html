<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangChain与LangGraph关系图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .diagram {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .level {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .box {
            padding: 20px 30px;
            border-radius: 12px;
            font-weight: bold;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .lcel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .langchain {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .langgraph {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .plus {
            font-size: 30px;
            color: #666;
        }
        .arrow {
            font-size: 30px;
            color: #4facfe;
        }
        .desc {
            text-align: center;
            color: #666;
            margin-top: 20px;
            line-height: 1.8;
        }
        .highlight {
            color: #4facfe;
            font-weight: bold;
        }
        .caption {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LangChain 与 LangGraph 关系图</h1>
        <div class="diagram">
            <div class="level">
                <div class="box lcel">
                    <div>LCEL</div>
                    <div style="font-size: 12px; font-weight: normal; margin-top: 5px;">LangChain 表达式语言</div>
                </div>
                <span class="plus">+</span>
                <div class="box langchain">
                    <div>LangChain</div>
                    <div style="font-size: 12px; font-weight: normal; margin-top: 5px;">AgentExecutor</div>
                </div>
            </div>
            <div class="arrow">↓</div>
            <div class="level">
                <div class="box langgraph">
                    <div>LangGraph</div>
                    <div style="font-size: 12px; font-weight: normal; margin-top: 5px;">StateGraph + 循环支持</div>
                </div>
            </div>
        </div>
        <div class="desc">
            <p><span class="highlight">LCEL</span> 提供 Runnable 接口和管道组合（| 运算符），构建无状态的 DAG</p>
            <p><span class="highlight">LangChain</span> 在 LCEL 基础上增加 AgentExecutor，但不支持循环</p>
            <p><span class="highlight">LangGraph</span> 用图取代 AgentExecutor，<span class="highlight">增加循环支持</span>，实现图灵完备</p>
        </div>
        <div class="caption">LangGraph = LangChain 表达式语言 + 状态管理 + 循环控制</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangGraph优势图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .advantages {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .advantage {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            border-top: 4px solid;
        }
        .advantage:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }
        .advantage:nth-child(1) { border-color: #667eea; }
        .advantage:nth-child(2) { border-color: #f093fb; }
        .advantage:nth-child(3) { border-color: #4facfe; }
        .advantage:nth-child(4) { border-color: #00f2fe; }
        .advantage:nth-child(5) { border-color: #43e97b; }
        .icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
        .advantage h3 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .advantage p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        .caption {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LangGraph 五大核心优势</h1>
        <div class="advantages">
            <div class="advantage">
                <div class="icon">🔄</div>
                <h3>循环和分支</h3>
                <p>在应用程序中实现循环和条件，满足复杂工作流需求</p>
            </div>
            <div class="advantage">
                <div class="icon">💾</div>
                <h3>持久性</h3>
                <p>在图中的每个步骤之后自动保存状态，支持暂停和恢复</p>
            </div>
            <div class="advantage">
                <div class="icon">🤝</div>
                <h3>人机交互</h3>
                <p>中断图形执行以批准或编辑代理计划的下一个操作</p>
            </div>
            <div class="advantage">
                <div class="icon">📺</div>
                <h3>流支持</h3>
                <p>流输出由每个节点生成，包括令牌流，实时反馈</p>
            </div>
            <div class="advantage">
                <div class="icon">🔗</div>
                <h3>LangChain 集成</h3>
                <p>与 LangChain 和 LangSmith 无缝集成，可观测性强</p>
            </div>
        </div>
        <div class="caption">LangGraph 官方优势特性</div>
    </div>
</body>
</html>

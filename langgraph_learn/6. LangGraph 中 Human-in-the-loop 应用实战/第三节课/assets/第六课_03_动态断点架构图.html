<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态断点架构</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 100%);
            min-height: 100vh;
            padding: 40px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: #fff;
            font-size: 32px;
            margin-bottom: 40px;
        }
        .dynamic-comparison {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }
        .compare-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .compare-card h3 {
            font-size: 20px;
            margin-bottom: 15px;
        }
        .compare-card.static h3 { color: #f5576c; }
        .compare-card.dynamic h3 { color: #43e97b; }
        .compare-card p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .compare-card ul {
            list-style: none;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
        }
        .compare-card ul li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .code-block {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            color: #4facfe;
            font-size: 12px;
            margin-top: 15px;
        }
        .benefit-section {
            background: rgba(67, 233, 123, 0.1);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(67, 233, 123, 0.3);
        }
        .benefit-section h2 {
            color: #43e97b;
            font-size: 22px;
            margin-bottom: 20px;
        }
        .benefit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .benefit-item {
            text-align: center;
            padding: 15px;
        }
        .benefit-item .icon { font-size: 32px; margin-bottom: 10px; }
        .benefit-item h4 { color: #fff; font-size: 16px; margin-bottom: 8px; }
        .benefit-item p { color: rgba(255,255,255,0.6); font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>动态断点 vs 静态断点</h1>
        
        <div class="dynamic-comparison">
            <div class="compare-card static">
                <h3>⚠️ 静态断点</h3>
                <p>在任意工具执行前都中断，等待人工审批</p>
                <ul>
                    <li>每个工具调用前都暂停</li>
                    <li>用户体验较差</li>
                    <li>适合高安全场景</li>
                </ul>
                <div class="code-block">interrupt_before=["action"]</div>
            </div>
            
            <div class="compare-card dynamic">
                <h3>✨ 动态断点</h3>
                <p>根据条件动态判断是否需要人工介入</p>
                <ul>
                    <li>只在敏感操作时中断</li>
                    <li>用户体验更好</li>
                    <li>智能决策判断</li>
                </ul>
                <div class="code-block">if tool.name == "delete":
    return "run_tool"</div>
            </div>
        </div>
        
        <div class="benefit-section">
            <h2>动态断点的优势</h2>
            <div class="benefit-grid">
                <div class="benefit-item">
                    <div class="icon">🎯</div>
                    <h4>精准触发</h4>
                    <p>只在执行敏感操作时中断</p>
                </div>
                <div class="benefit-item">
                    <div class="icon">⚡</div>
                    <h4>高效执行</h4>
                    <p>普通操作直接执行无需等待</p>
                </div>
                <div class="benefit-item">
                    <div class="icon">🛡️</div>
                    <h4>安全可控</h4>
                    <p>高风险操作必须人工确认</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人机交互式信息管理系统架构</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: #fff;
            font-size: 32px;
            margin-bottom: 40px;
        }
        .system-overview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .tool-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tool-card.query { border-top: 3px solid #4facfe; }
        .tool-card.insert { border-top: 3px solid #43e97b; }
        .tool-card.delete { border-top: 3px solid #f5576c; }
        .tool-card.weather { border-top: 3px solid #667eea; }
        .tool-card .icon { font-size: 32px; margin-bottom: 10px; }
        .tool-card h3 { color: #fff; font-size: 14px; margin-bottom: 8px; }
        .tool-card p { color: rgba(255,255,255,0.6); font-size: 11px; }
        .workflow-flow {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .workflow-flow h2 {
            color: #fff;
            font-size: 20px;
            margin-bottom: 25px;
            text-align: center;
        }
        .flow-nodes {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .flow-node {
            background: rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            min-width: 120px;
        }
        .flow-node.agent { background: rgba(79, 172, 254, 0.2); }
        .flow-node.action { background: rgba(67, 233, 123, 0.2); }
        .flow-node.run-tool { background: rgba(245, 87, 108, 0.2); }
        .flow-node.end { background: rgba(254, 225, 64, 0.2); }
        .flow-node h4 { color: #fff; font-size: 14px; margin-bottom: 5px; }
        .flow-node p { color: rgba(255,255,255,0.6); font-size: 11px; }
        .flow-arrow {
            font-size: 24px;
            color: rgba(255,255,255,0.5);
        }
        .hil-badge {
            display: inline-block;
            background: #f5576c;
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>人机交互式信息管理系统架构</h1>
        
        <div class="system-overview">
            <div class="tool-card weather">
                <div class="icon">🌤️</div>
                <h3>get_weather</h3>
                <p>获取实时天气</p>
            </div>
            <div class="tool-card insert">
                <div class="icon">💾</div>
                <h3>insert_weather_to_db</h3>
                <p>插入天气到数据库</p>
            </div>
            <div class="tool-card query">
                <div class="icon">🔍</div>
                <h3>query_weather_from_db</h3>
                <p>从数据库查询天气</p>
            </div>
            <div class="tool-card delete">
                <div class="icon">🗑️</div>
                <h3>delete_weather_from_db</h3>
                <p>从数据库删除<span class="hil-badge">HIL</span></p>
            </div>
        </div>
        
        <div class="workflow-flow">
            <h2>Agent 工作流程</h2>
            <div class="flow-nodes">
                <div class="flow-node">
                    <h4>START</h4>
                    <p>用户输入</p>
                </div>
                <div class="flow-arrow">→</div>
                <div class="flow-node agent">
                    <h4>agent</h4>
                    <p>call_model</p>
                </div>
                <div class="flow-arrow">→</div>
                <div class="flow-node action">
                    <h4>action</h4>
                    <p>ToolNode</p>
                </div>
                <div class="flow-arrow">→</div>
                <div class="flow-node run-tool">
                    <h4>run_tool</h4>
                    <p>delete操作<span class="hil-badge">HIL</span></p>
                </div>
                <div class="flow-arrow">→</div>
                <div class="flow-node end">
                    <h4>END</h4>
                    <p>输出结果</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

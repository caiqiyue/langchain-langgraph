<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReAct Agent 循环机制图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 40px;
            font-size: 28px;
        }
        .diagram {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
        }
        .flow {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .row {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .node {
            background: linear-gradient(145deg, #0f3460, #16213e);
            border: 2px solid #e94560;
            border-radius: 12px;
            padding: 20px 30px;
            color: #fff;
            text-align: center;
            min-width: 150px;
            transition: all 0.3s ease;
        }
        .node:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(233,69,96,0.3);
        }
        .node.agent {
            background: linear-gradient(145deg, #3498db, #2980b9);
            border-color: #3498db;
        }
        .node.tool {
            background: linear-gradient(145deg, #f39c12, #d68910);
            border-color: #f39c12;
        }
        .node.decision {
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
            border-color: #9b59b6;
        }
        .node.end {
            background: linear-gradient(145deg, #27ae60, #219a52);
            border-color: #2ecc71;
        }
        .arrow {
            color: #e94560;
            font-size: 24px;
        }
        .loop-box {
            border: 3px dashed #9b59b6;
            border-radius: 16px;
            padding: 30px;
            background: rgba(155,89,182,0.1);
        }
        .loop-title {
            color: #9b59b6;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .key-point {
            background: rgba(46,204,113,0.2);
            border-left: 4px solid #27ae60;
            padding: 15px 20px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
            color: #ccc;
        }
        .description {
            color: #aaa;
            text-align: center;
            margin-top: 30px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ReAct Agent 循环机制图</h1>
        <div class="diagram">
            <div class="flow">
                <div class="row">
                    <div class="node">用户输入</div>
                </div>
                <div class="arrow">↓</div>
                <div class="loop-box">
                    <div class="loop-title">While 循环（直到无需更多工具调用）</div>
                    <div class="row">
                        <div class="node agent">Agent LLM</div>
                    </div>
                    <div class="arrow">↓</div>
                    <div class="row">
                        <div class="node decision">决策：是否需要调用工具？</div>
                    </div>
                    <div class="branch" style="margin-top: 15px;">
                        <div class="branch-item">
                            <span class="label" style="color: #f39c12;">是</span>
                            <span class="arrow">↓</span>
                            <div class="node tool">ToolNode</div>
                        </div>
                        <div class="branch-item">
                            <span class="label" style="color: #27ae60;">否</span>
                            <span class="arrow">↓</span>
                            <div class="node end">结束</div>
                        </div>
                    </div>
                    <div style="text-align: center; margin-top: 10px;">
                        <span class="label" style="color: #f39c12;">↓ 执行结果</span>
                    </div>
                </div>
            </div>

            <div class="key-point">
                <strong>核心特点：</strong><br>
                ReAct = Reasoning + Acting<br>
                - 多步骤决策：Agent可以控制一系列决策<br>
                - 工具访问：Agent可以选择并使用多种工具
            </div>

            <div class="description">
                <strong>工作原理：</strong><br>
                1. Agent接收用户输入并决定是否调用工具<br>
                2. 如果需要，调用ToolNode执行工具<br>
                3. 执行结果反馈给Agent<br>
                4. Agent再次决策，直到任务完成
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State状态传递图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .state-diagram {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .state-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .state-header {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .state-content {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #333;
        }
        .node-flow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .node {
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            min-width: 100px;
        }
        .node-agent {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .node-action {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .node-end {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .arrow {
            font-size: 24px;
            color: #667eea;
        }
        .caption {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LangGraph State 状态传递机制</h1>
        <div class="state-diagram">
            <div class="state-box">
                <div class="state-header">INPUT STATE (用户输入)</div>
                <div class="state-content">{
    "question": "什么是人工智能？"
}</div>
            </div>
            <div class="node-flow">
                <div class="node node-agent">
                    <h4>Agent Node</h4>
                    <p>读取 question</p>
                </div>
                <span class="arrow">→</span>
                <div class="node node-action">
                    <h4>Action Node</h4>
                    <p>生成 answer</p>
                </div>
                <span class="arrow">→</span>
                <div class="node node-end">
                    <h4>END</h4>
                    <p>返回结果</p>
                </div>
            </div>
            <div class="state-box">
                <div class="state-header">OVERALL STATE (节点间传递)</div>
                <div class="state-content">{
    "question": "什么是人工智能？",
    "answer": "人工智能是..."
}</div>
            </div>
            <div class="state-box">
                <div class="state-header">OUTPUT STATE (最终输出)</div>
                <div class="state-content">{
    "answer": "人工智能是..."
}</div>
            </div>
        </div>
        <div class="caption">状态在节点间传递，每个节点可以读写状态通道</div>
    </div>
</body>
</html>

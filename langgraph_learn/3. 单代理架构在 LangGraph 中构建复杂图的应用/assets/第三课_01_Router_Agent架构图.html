<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Router Agent 架构图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 40px;
            font-size: 28px;
        }
        .diagram {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
        }
        .flow {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .row {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .node {
            background: linear-gradient(145deg, #0f3460, #16213e);
            border: 2px solid #e94560;
            border-radius: 12px;
            padding: 20px 30px;
            color: #fff;
            text-align: center;
            min-width: 150px;
            transition: all 0.3s ease;
        }
        .node:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(233,69,96,0.3);
        }
        .node.start {
            background: linear-gradient(145deg, #e94560, #c23a51);
        }
        .node.router {
            background: linear-gradient(145deg, #533483, #3d2470);
            border-color: #9b59b6;
        }
        .node.end {
            background: linear-gradient(145deg, #27ae60, #219a52);
            border-color: #2ecc71;
        }
        .node.tool {
            background: linear-gradient(145deg, #f39c12, #d68910);
            border-color: #f1c40f;
        }
        .arrow {
            color: #e94560;
            font-size: 24px;
        }
        .arrow-down {
            font-size: 30px;
        }
        .branch {
            display: flex;
            gap: 40px;
            margin-top: 20px;
        }
        .branch-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .label {
            color: #9b59b6;
            font-weight: bold;
        }
        .description {
            color: #aaa;
            text-align: center;
            margin-top: 30px;
            line-height: 1.8;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Router Agent 架构图</h1>
        <div class="diagram">
            <div class="flow">
                <div class="row">
                    <div class="node start">用户输入</div>
                    <span class="arrow">→</span>
                    <div class="node">Start</div>
                </div>
                <div class="arrow-down arrow">↓</div>
                <div class="row">
                    <div class="node router">Router Function</div>
                </div>
                <div class="arrow-down arrow">↓</div>
                <div class="row">
                    <div class="node router">条件边判断</div>
                </div>
                <div class="branch">
                    <div class="branch-item">
                        <span class="label">True</span>
                        <span class="arrow">↓</span>
                        <div class="node tool">Tool/DB Node</div>
                    </div>
                    <div class="branch-item">
                        <span class="label">False</span>
                        <span class="arrow">↓</span>
                        <div class="node end">Response Node</div>
                    </div>
                </div>
                <div class="arrow-down arrow">↓</div>
                <div class="row">
                    <div class="node end">End</div>
                </div>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #e94560;"></div>
                    <span>开始节点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #533483;"></div>
                    <span>路由节点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f39c12;"></div>
                    <span>工具节点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #27ae60;"></div>
                    <span>结束节点</span>
                </div>
            </div>

            <div class="description">
                <strong>工作原理：</strong><br>
                1. 用户输入进入Router Agent<br>
                2. Router Function根据结构化输出判断路由方向<br>
                3. 根据判断结果选择执行工具节点或直接回复节点<br>
                4. 两种架构的共同点：通过预定义的分支结构灵活适配不同场景
            </div>
        </div>
    </div>
</body>
</html>
